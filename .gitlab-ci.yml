stages:
  - lint
  - test

lint:
  stage: lint
  image: python:3.13-slim
  script:
    - pip install ruff
    - ruff check src/

test:
  stage: test
  image: python:3.13-slim
  script:
    - apt-get update -qq && apt-get install -y -qq libgl1 libglib2.0-0 > /dev/null
    - pip install -e ".[test]" --quiet
    - python -m pytest tests/ -v
